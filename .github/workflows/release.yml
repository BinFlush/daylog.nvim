name: Release

# Publish a GitHub Release whose notes are the matching CHANGELOG.md section.
# Fires automatically when a vX.Y.Z tag is pushed; can also be run by hand
# (workflow_dispatch) to back-fill a release for an already-pushed tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build a release for (e.g. v0.5.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Build release notes from CHANGELOG
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          version="${TAG#v}"
          awk -v h="## $version " '
            index($0, h) == 1 { f = 1; next }   # the "## <version> " heading
            f && /^## / { exit }                # stop at the next version
            f { print }
          ' CHANGELOG.md > NOTES.md
          sed -i -e '/./,$!d' NOTES.md          # trim leading blank lines
          if [ ! -s NOTES.md ]; then
            echo "::error::No CHANGELOG section found for ${version}"
            exit 1
          fi
          echo '----- release notes -----'
          cat NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release create "$TAG" --title "$TAG" --notes-file NOTES.md
